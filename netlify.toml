# 1. Configuração de Construção
[build]
  command = "npm run build"
  publish = "dist/client"

# 2. Regras de Redirecionamento (Resolve 404 e conflitos de rota)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true # Força o Netlify a sempre usar o seu index.html

# 3. Cabeçalhos de Permissão (Resolve possíveis erros 401/Access Denied)
[[headers]]
  for = "/*"
  [headers.values]
    Access-Control-Allow-Origin = "*"
    X-Frame-Options = "ALLOWALL"
    X-Content-Type-Options = "nosniff"
    Cache-Control = "public, max-age=0, must-revalidate"