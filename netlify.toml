[build]
  command = "npm run build"
  publish = "dist/client"

# Esta regra força o Netlify a redirecionar TUDO para o index.html
# permitindo que o TanStack Router controle as páginas.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    # Garante que o navegador não tente adivinhar o tipo de arquivo
    X-Content-Type-Options = "nosniff"